name: Slip
options:
  bundleIdPrefix: com.devkoan
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: NO

packages:
  SlipCore:
    path: SlipCore

targets:
  Slip:
    type: application
    platform: macOS
    sources:
      - path: App
        excludes:
          - "**/.DS_Store"
    resources:
      - path: App/Resources
        optional: true
    dependencies:
      - package: SlipCore
        product: SlipCore
    info:
      path: App/Info.plist
      properties:
        CFBundleName: Slip
        CFBundleDisplayName: Slip
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        NSHumanReadableCopyright: "Copyright © 2026 devkoan. All rights reserved."
        LSApplicationCategoryType: public.app-category.productivity
        # Keep dock icon by default; MenuBarController can toggle LSUIElement at runtime
        # if you later want a pure menu-bar app.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.devkoan.Slip
        CODE_SIGN_ENTITLEMENTS: App/Slip.entitlements
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"

schemes:
  Slip:
    build:
      targets:
        Slip: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
